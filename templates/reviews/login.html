{% extends "base.html" %}
{% block content %}
<div class="breadcrumb">
    <a href="{% url 'home' %}">Trang chủ</a> &gt; <span>Đăng nhập</span>
</div>

<div class="auth-container">
    <h2 class="auth-title">ĐĂNG NHẬP</h2>
    <form action="{% url 'login' %}" method="POST" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
            <input type="text" name="username" placeholder="Tên đăng nhập hoặc Số điện thoại" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Mật khẩu" required>
        </div>
        <button type="submit" class="btn-auth-submit">ĐĂNG NHẬP</button>
        <div class="auth-links-footer">
            <a href="#">Quên mật khẩu?</a>
            <a href="{% url 'register' %}">Đăng ký tài khoản</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Phát hiện khi người dùng quay lại trang này bằng nút Back
    window.addEventListener('pageshow', function(event) {
        // event.persisted = true nếu trang được load từ cache (Back/Forward cache)
        if (event.persisted || (typeof window.performance != "undefined" && window.performance.navigation.type === 2)) {
            // Force reload để server kiểm tra lại trạng thái session
            window.location.reload();
        }
    });

    // Nếu vào trang bình thường mà đã login rồi thì đẩy ra home ngay lập tức
    if ("{{ request.user.is_authenticated }}" === "True") {
        window.location.replace("{% url 'home' %}");
        // Vô hiệu hóa nút Back quay lại trang này sau khi đã vào trang chủ
        window.history.forward();
    }
</script>
{% endblock %}
