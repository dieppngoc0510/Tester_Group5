{% extends "base.html" %}
{% block content %}
<div class="breadcrumb">
    <a href="{% url 'home' %}">Trang chủ</a> &gt; <span>Đăng ký tài khoản</span>
</div>

<div class="auth-container">
    <h2 class="auth-title">ĐĂNG KÝ</h2>
    <form action="{% url 'register' %}" method="POST" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
            <input type="text" name="username" placeholder="Tên đăng nhập" required>
        </div>
        <div class="form-group">
            <input type="text" name="fullname" placeholder="Họ và tên" required>
        </div>
        <div class="form-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
            <input type="tel" name="phone" placeholder="Số điện thoại" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Mật khẩu" required>
        </div>
        <div class="form-group address-input-container">
            <input type="text" name="address" class="address-input-styled" placeholder="Địa chỉ nhận hàng" required>
        </div>
        <button type="submit" class="btn-auth-submit">ĐĂNG KÝ</button>
    </form>
</div>
{% block scripts %}
<script>
    // Phát hiện khi người dùng quay lại trang này bằng nút Back
    window.addEventListener('pageshow', function(event) {
        if (event.persisted || (typeof window.performance != "undefined" && window.performance.navigation.type === 2)) {
            window.location.reload();
        }
    });

    if ("{{ request.user.is_authenticated }}" === "True") {
        window.location.replace("{% url 'home' %}");
        window.history.forward();
    }
</script>
{% endblock %}
